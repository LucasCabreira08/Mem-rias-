<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Minhas Memórias</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container py-5 text-center">

<h1 class="mb-5">Minhas Memórias</h1>

<button class="btn btn-primary btn-lg"
data-bs-toggle="modal"
data-bs-target="#galeria">
Ver Fotos
</button>

</div>


<div class="modal fade" id="galeria">
<div class="modal-dialog modal-xl modal-dialog-centered">
<div class="modal-content bg-dark text-light">

<div class="modal-header">
<h5 class="modal-title">Minhas Memórias</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="imagem1.jpg.png" class="d-block w-100" alt="Foto 1">
    </div>
    <div class="carousel-item">
      <img src="imagem (3).png" class="d-block w-100" alt="Foto 2">
    </div>
    <div class="carousel-item">
      <img src="imagem.png" class="d-block w-100" alt="Foto 3">
    </div>
  </div><div class="carousel-item">
      <img src="imagem (5).png" class="d-block w-100" alt="Foto 3">
    </div>
    </div><div class="carousel-item">
      <img src="imagem (4).png" class="d-block w-100" alt="Foto 3">
    </div>
    </div><div class="carousel-item">
      <img src="imagem (6).png" class="d-block w-100" alt="Foto 3">
    </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Anterior</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Próximo</span>
  </button>
</div>

</div>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
